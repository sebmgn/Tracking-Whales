name: Check propositions

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: notify
        run: npm install --omit=dev

      - name: Run check
        working-directory: notify
        env:
          PREDICT_API_KEY: ${{ secrets.PREDICT_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: node check-propositions.js

      - name: Commit updated state
        run: |
          git config user.name "propositions-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add notify/state.json
          git diff --cached --quiet || git commit -m "chore: update notification state"
          git push
